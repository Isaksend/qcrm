[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["alembic/versions", "ai_training", "mlruns"]

[tool.ruff.lint]
# Keep CI green while legacy modules are cleaned up incrementally.
ignore = [
  "E402",   # module import not at top (Alembic / scripts)
  "E501",   # line length
  "E701",   # multiple statements on one line (legacy style)
  "E712",   # comparison to False (legacy)
  "E722",   # bare except (remaining legacy)
  "F401",   # unused imports (incremental cleanup)
  "F403",   # star imports in schemas package
  "F841",   # unused variables (legacy)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
asyncio_default_fixture_loop_scope = "function"
