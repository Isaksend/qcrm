name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: cd backend && ruff check .

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Typecheck (lint)
        run: npm run lint

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Alembic migration smoke (SQLite)
        env:
          DATABASE_URL: sqlite:///./ci_migration.db
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          APP_ENV: development
        run: |
          cd backend
          alembic upgrade head
      - name: Pytest
        env:
          DATABASE_URL: sqlite:///./ci_pytest.db
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          APP_ENV: development
        run: |
          cd backend
          pytest -q

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Vitest
        run: npm run test
      - name: Production build
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Post-deploy smoke (optional)
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "Set repository secret DEPLOY_URL to your public API base (e.g. https://api.example.com) to run /healthz after deploy."
            exit 0
          fi
          curl -fsS "$DEPLOY_URL/healthz" | head -c 200
          echo
